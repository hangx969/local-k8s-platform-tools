name: helm lint and diff

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  HELM_VERSION: v3.6.3

defaults:
  run:
    shell: bash
    working-directory: /

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: self-hosted

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Helm Lint Base
      # Create inline script to use helm lint
        run: |
        # fix values.yaml path for helm lint
        # fix secrets cannot be used
          pwd
          helm lint /helm/base --values /helm/base/values.yaml --kubeconfig '${{ secrets.LOCAL_KUBECONFIG }}'
